<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sunshine Academy - Contact</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Navbar -->
        <header>
            <nav class="navbar">
            <div class="logo">Sunshine Academy</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="hamburger">&#9776;</div>
            </nav>
        </header>

        <!-- Contact Content -->
        <section class="contact">
            <h1>Get in Touch</h1>
            <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea class="message" id="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
            </form>

            <div class="contact-info">
            <p><strong>Address:</strong> 123 Sunshine Street, Learning City</p>
            <p><strong>Phone:</strong> 0123 456 789</p>
            <p><strong>Email:</strong> info@sunshineacademy.cim</p>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2025 Sunshine Academy | All rights reserved.</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
